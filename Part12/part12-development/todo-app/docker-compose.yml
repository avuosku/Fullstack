version: "3.8"

services:
  mongo:
    image: mongo

  redis:
    image: redis

  todo-backend:
    build: ./todo-backend
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis

  todo-frontend:
    build: ./todo-frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - todo-frontend
      - todo-backend
